apiVersion: v1
kind: ServiceAccount
metadata:
  name: hierarchical_scheduler
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hierarchical_scheduler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:kube-scheduler
subjects:
  - kind: ServiceAccount
    name: hierarchical_scheduler
    namespace: kube-system