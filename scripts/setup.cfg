# Core component replicas (default: 1, for high-availability use 3)
CONTROL_PLANE_REPLICAS=1
# Do not change for now - FEATURE TO BE IMPLEMENTED
DATA_PLANE_REPLICAS=1

# Fake worker node experiment - enable = 1; disable = 0
FAKE_WORKER_MODE=0
DAEMONS_PER_NODE=1

# Choose from [containerd, firecracker]
WORKER_RUNTIME="containerd"

# Scheduling mode:
#   - "existing": use existing dirigent baseline
#   - "hierarchical": use hierarchical scheduler
#   - "weighted-round-robin": round robin with fast nodes getting 2x slots
SCHEDULING_MODE="hierarchical"

# Don't touch this one. Please.
DEFAULT_PLACEMENT_POLICY="random"

# First [NUM_FAST_WORKERS] in input list after loader + control plane + data plane nodes
# are fast nodes. The rest are slow nodes
NUM_FAST_WORKERS=7

# Reference target clock speeds used in experiments. 2.4 and 1.2GHz should be accurate for xl170.
FAST_WORKER_CLOCK="2.4GHz"
SLOW_WORKER_CLOCK="1.2GHz"

# Utilization threshold where fast nodes get deprioritized for slow nodes
# Only applies when using hierarchical scheduler. Existing scheduler ignores this.
HIERARCHICAL_THRESHOLD=80.0
